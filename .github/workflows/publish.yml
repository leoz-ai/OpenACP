name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf-8'));
            pkg.version = '$VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Build CLI types (needed by SDK)
        run: pnpm build

      - run: pnpm build:publish

      - name: Publish @openacp/cli
        working-directory: dist-publish
        run: npm publish --access=public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @openacp/plugin-sdk
        if: hashFiles('dist-publish-sdk/package.json') != ''
        working-directory: dist-publish-sdk
        run: npm publish --access=public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Update plugin registry
        env:
          GH_TOKEN: ${{ secrets.REGISTRY_PAT }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "REGISTRY_PAT not set, skipping registry update"
            exit 0
          fi

          # Clone registry repo
          git clone "https://x-access-token:${GH_TOKEN}@github.com/Open-ACP/plugin-registry.git" /tmp/plugin-registry
          cd /tmp/plugin-registry

          # Update version in all built-in plugin entries
          for f in plugins/openacp--*.json; do
            if [ -f "$f" ]; then
              node -e "
                const fs = require('fs');
                const p = JSON.parse(fs.readFileSync('$f', 'utf-8'));
                p.version = '$VERSION';
                fs.writeFileSync('$f', JSON.stringify(p, null, 2) + '\n');
              "
            fi
          done

          # Rebuild registry.json + README
          npm ci
          npx tsx scripts/build-registry.ts

          # Commit and push if changed
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: update built-in plugins to v${VERSION}"
          git push
